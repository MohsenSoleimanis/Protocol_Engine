<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Protocol Intelligence System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg-0:#08090D;--bg-1:#0E1117;--bg-2:#161B22;--bg-3:#1C2333;--bg-card:#141920;--bg-hover:#1A2030;--border:#21262D;--border-a:#3B82F6;--t0:#F0F6FC;--t1:#C9D1D9;--t2:#8B949E;--t3:#484F58;--blue:#3B82F6;--cyan:#06B6D4;--green:#10B981;--amber:#F59E0B;--rose:#EF4444;--violet:#8B5CF6;--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--display:'Playfair Display',serif}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg-0);color:var(--t1);font-family:var(--font);font-size:13.5px;line-height:1.6}::selection{background:rgba(59,130,246,.3)}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app{display:flex;height:100vh}.sidebar{width:240px;min-width:240px;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column}.sidebar-brand{padding:20px 16px;border-bottom:1px solid var(--border)}.sidebar-brand h1{font-family:var(--display);font-size:18px;font-weight:700;color:var(--t0);letter-spacing:-.5px}.sidebar-brand h1 span{color:var(--cyan)}.sidebar-brand p{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}.nav-group{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);padding:14px 12px 4px;font-weight:600}.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--t2);transition:all .15s}.nav-item:hover{background:var(--bg-hover);color:var(--t1)}.nav-item.active{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--t3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.topbar{padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg-1);display:flex;align-items:center;gap:16px}.topbar-title{font-weight:600;font-size:15px;color:var(--t0)}.topbar-meta{font-size:11px;color:var(--t3);font-family:var(--mono)}.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px}.card-body{padding:16px 18px}
.query-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}.qcard{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s}.qcard:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}.qcard .qi{font-size:20px;margin-bottom:8px}.qcard .ql{font-size:12px;font-weight:600;color:var(--t0);margin-bottom:4px}.qcard .qd{font-size:10px;color:var(--t3);line-height:1.4}
.chain{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}.cstep{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:12px}.cstep .cm{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}.cstep.tool_call .cm{background:rgba(6,182,212,.15);color:var(--cyan)}.cstep.tool_result .cm{background:rgba(16,185,129,.15);color:var(--green)}.cstep.extraction .cm{background:rgba(59,130,246,.15);color:var(--blue)}.cstep.validation .cm{background:rgba(52,211,153,.15);color:var(--green)}.cstep.final .cm{background:rgba(16,185,129,.2);color:var(--green)}.cstep .cb{flex:1}.cstep .cn{font-weight:600;font-size:11px;color:var(--t0);text-transform:uppercase;letter-spacing:.5px}.cstep .cc{color:var(--t2);margin-top:2px;font-family:var(--mono);font-size:11px;line-height:1.5;word-break:break-word}.cstep .ct{font-size:10px;color:var(--t3);font-family:var(--mono)}
.ri{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px}.rih{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}.badge{font-size:9px;font-family:var(--mono);padding:2px 8px;border-radius:10px;font-weight:600}.bp{background:rgba(59,130,246,.15);color:var(--blue)}.bs{background:rgba(139,92,246,.15);color:var(--violet)}.bg{background:rgba(16,185,129,.15);color:var(--green)}.bw{background:rgba(245,158,11,.15);color:var(--amber)}.br{background:rgba(239,68,68,.15);color:var(--rose)}.bc{background:rgba(6,182,212,.15);color:var(--cyan)}
.gr{font-size:9px;font-family:var(--mono);padding:2px 8px;border-radius:8px;margin-left:auto}.gr.v{background:rgba(16,185,129,.12);color:var(--green)}.gr.f{background:rgba(245,158,11,.12);color:var(--amber)}
.sdtm{font-family:var(--mono);font-size:11px;color:var(--green);background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);padding:8px 12px;border-radius:6px;margin-top:6px}
.chat-area{display:flex;flex-direction:column;height:100%}.chat-msgs{flex:1;overflow-y:auto;padding-bottom:16px}.chat-in{display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border)}.chat-in input{flex:1;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--t0);font-family:var(--font);font-size:13px;outline:none}.chat-in input:focus{border-color:var(--blue)}.chat-in button{background:var(--blue);border:none;color:#fff;padding:12px 20px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;font-family:var(--font)}.chat-in button:disabled{opacity:.3;cursor:not-allowed}
.umsg{text-align:right;margin-bottom:16px}.ubub{display:inline-block;background:var(--blue);color:#fff;padding:10px 16px;border-radius:12px 12px 2px 12px;font-size:13px;max-width:70%;text-align:left}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:48px;text-align:center;cursor:pointer;transition:all .2s}.upload-zone:hover{border-color:var(--blue);background:rgba(59,130,246,.03)}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}.pulsing{animation:pulse-dot 1.2s infinite}
</style></head><body>
<div class="app" id="app"></div>
<script>
const S={page:'upload',loaded:false,name:'',meta:null,msgs:[],loading:false,steps:[],liveEvents:[]};
const QS=[
  {id:'endpoints',l:'Extract Endpoints',i:'◎',d:'Objectives, populations, timing'},
  {id:'eligibility',l:'Eligibility Criteria',i:'☐',d:'Inclusion/exclusion with automation'},
  {id:'intervention',l:'Intervention',i:'💉',d:'Drug, dose, route, comparator'},
  {id:'safety',l:'Safety Monitoring',i:'⚑',d:'AEs, AESIs, stopping rules'},
  {id:'deviation',l:'Deviation Rules',i:'⚡',d:'SDTM-mapped for SMART engine'},
  {id:'kri',l:'Key Risk Indicators',i:'📊',d:'KRIs + QTLs for RBQM/SMART'},
  {id:'risk',l:'Protocol Quality',i:'△',d:'Vague language, gaps per ICH E8'},
  {id:'ambiguity',l:'Ambiguity Analysis',i:'◇',d:'Deontic, temporal, regulatory'},
  {id:'consistency',l:'Consistency Checks',i:'◈',d:'Synopsis vs details'},
  {id:'soa',l:'Schedule of Activities',i:'📅',d:'Visits, procedures, timing'},
  {id:'study_design',l:'Study Design',i:'🔬',d:'Phase, randomization, blinding'},
  {id:'statistical',l:'Statistical Design',i:'📈',d:'Sample size, power, interim analyses'},
  {id:'general',l:'Ask Anything',i:'✦',d:'Freeform with grounding'},
];

const api={
  status:()=>fetch('/api/status').then(r=>r.json()),
  load:()=>fetch('/api/load',{method:'POST'}).then(r=>r.json()),
  upload:f=>{const fd=new FormData();fd.append('file',f);return fetch('/api/upload',{method:'POST',body:fd}).then(r=>r.json())},
  query:(q,t)=>fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,query_type:t||null})}).then(r=>r.json()),
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escML(s){var t=esc(s);t=t.replace(/\n/g,'<br>');t=t.replace(/\(([a-z])\)/g,'<br>&nbsp;&nbsp;($1)');t=t.replace(/; \(([a-z])\)/g,';<br>&nbsp;&nbsp;($1)');return t}

function gr(g){if(!g)return'';const ok=g.exact_source_text&&g.page>0;return '<span class="gr '+(ok?'v':'f')+'">'+(ok?'\u2713':'\u26a0')+' '+(g.section_id?'\u00a7'+g.section_id:'')+' '+(g.page?'p.'+g.page:'')+'</span>'}

function renderChain(steps){
  if(!steps||!steps.length)return'';
  const icons={thinking:'\ud83d\udcad',tool_call:'\ud83d\udd27',tool_result:'\ud83d\udcc4',extraction:'\ud83e\uddec',validation:'\u2713',final:'\u2705'};
  let h='<div class="chain">';
  for(const s of steps){
    const t=s.type||'thinking';
    h+='<div class="cstep '+t+'"><div class="cm">'+(icons[t]||'\u25cf')+'</div><div class="cb"><div class="cn">'+esc(s.name)+'</div><div class="cc">'+esc((s.content||'').substring(0,400))+'</div></div>'+(s.duration_ms?'<div class="ct">'+s.duration_ms+'ms</div>':'')+'</div>';
  }
  return h+'</div>';
}

function renderData(d,t){
  if(!d)return'<div style="color:var(--t3)">No data</div>';
  // Endpoints
  if(t==='endpoints'&&d.endpoints){let h='';if(d.total)h+='<div style="margin-bottom:12px;font-size:12px">'+Object.entries(d.total).map(([k,v])=>'<span style="margin-right:14px">'+k+': <strong style="color:var(--t0)">'+v+'</strong></span>').join('')+'</div>';for(const e of d.endpoints){const c=e.category||'';const cls=c.includes('primary')?'bp':c.includes('secondary')?'bs':c.includes('exploratory')?'bc':'bg';h+='<div class="ri"><div class="rih"><span class="badge '+cls+'">'+esc(e.id||'?')+'</span><strong style="font-size:12px;flex:1">'+esc(e.objective||'')+'</strong>'+gr(e.grounding)+'</div>'+(e.endpoint?'<div style="font-size:12px;color:var(--t2);margin-top:4px">'+escML(e.endpoint)+'</div>':'')+(e.population||e.timing?'<div style="font-size:10px;color:var(--t3);margin-top:4px">'+(e.population?'Pop: '+esc(e.population):'')+(e.timing?' | Timing: '+esc(e.timing):'')+'</div>':'')+'</div>'}return h}
  // Eligibility
  if(t==='eligibility'&&(d.inclusion||d.exclusion)){let h='';if(d.summary)h+='<div style="margin-bottom:12px;font-size:12px">Total: <strong>'+esc(d.summary.total||'')+'</strong> | Auto: <strong style="color:var(--green)">'+esc(d.summary.full_auto||0)+'</strong> | Partial: <strong style="color:var(--amber)">'+esc(d.summary.partial||0)+'</strong> | Manual: <strong style="color:var(--rose)">'+esc(d.summary.manual||0)+'</strong></div>';for(const[lb,items]of[['Inclusion',d.inclusion],['Exclusion',d.exclusion]]){if(!items||!items.length)continue;h+='<div style="font-size:13px;font-weight:600;color:var(--t0);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:6px">'+lb+' Criteria ('+items.length+')</div>';for(const c of items){const al=c.automation_level||c.automation||'?';const ac=al==='FULL'?'bg':al==='PARTIAL'?'bw':'br';h+='<div class="ri"><div class="rih"><span class="badge bc">'+esc(c.id)+'</span>'+(c.category?'<span style="font-size:10px;color:var(--t3)">'+esc(c.category)+'</span>':'')+'<span class="badge '+ac+'">'+esc(al)+'</span>'+gr(c.grounding)+'</div><div style="font-size:12px;margin-top:4px">'+escML(c.text)+'</div>'+(c.logic&&c.logic!=='null'?'<div style="font-family:var(--mono);font-size:11px;color:var(--cyan);margin-top:4px">\u2192 '+esc(c.logic)+'</div>':'')+(c.exceptions&&c.exceptions.length?'<div style="font-size:11px;color:var(--amber);margin-top:4px">\u26a0 Exceptions: '+c.exceptions.map(esc).join('; ')+'</div>':'')+(c.cross_references&&c.cross_references.length?'<div style="font-size:10px;color:var(--t3);margin-top:2px">Refs: '+c.cross_references.map(esc).join(', ')+'</div>':'')+'</div>'}}return h}
  // Safety
  if(t==='safety'){let h='';if(d.aesis&&d.aesis.length){h+='<div style="font-size:13px;font-weight:600;color:var(--rose);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px">AESIs ('+d.aesis.length+')</div>';for(const a of d.aesis)h+='<div class="ri"><div class="rih"><strong>'+esc(a.name)+'</strong>'+gr(a.grounding)+'</div><div style="font-size:12px;color:var(--t2);margin-top:4px">'+escML(a.definition||'')+'</div>'+(a.reporting_timeframe?'<div style="font-size:10px;color:var(--t3);margin-top:2px">Reporting: '+esc(a.reporting_timeframe)+'</div>':'')+'</div>'}if(d.monitoring_rules&&d.monitoring_rules.length){h+='<div style="font-size:13px;font-weight:600;color:var(--amber);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:6px">Monitoring Rules ('+d.monitoring_rules.length+')</div>';for(const r of d.monitoring_rules)h+='<div class="ri"><div class="rih"><span class="badge bc">'+esc(r.id||'')+'</span><strong style="flex:1">'+esc(r.description)+'</strong>'+gr(r.grounding)+'</div>'+(r.trigger?'<div style="font-size:11px;color:var(--t2);margin-top:4px">Trigger: '+esc(r.trigger)+'</div>':'')+(r.action?'<div style="font-size:11px;color:var(--cyan);margin-top:2px">Action: '+esc(r.action)+'</div>':'')+(r.timeframe?'<div style="font-size:10px;color:var(--t3);margin-top:2px">Timeframe: '+esc(r.timeframe)+'</div>':'')+'</div>'}if(d.collection_windows&&d.collection_windows.length){h+='<div style="font-size:13px;font-weight:600;color:var(--cyan);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:6px">Collection Windows ('+d.collection_windows.length+')</div>';for(const w of d.collection_windows)h+='<div class="ri"><strong>'+esc(w.name)+'</strong><div style="font-size:11px;color:var(--t2);margin-top:4px">Day '+esc(w.start_day)+' to Day '+esc(w.end_day)+' | '+esc(w.population||'')+'</div>'+(w.detail?'<div style="font-size:10px;color:var(--t3);margin-top:2px">'+esc(w.detail)+'</div>':'')+'</div>'}if(d.stopping_rules&&d.stopping_rules.length){h+='<div style="font-size:13px;font-weight:600;color:var(--rose);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:6px">Stopping Rules ('+d.stopping_rules.length+')</div>';for(const s of d.stopping_rules)h+='<div class="ri"><div style="font-size:12px;color:var(--t0)">'+esc(s.description||JSON.stringify(s))+'</div>'+(s.trigger_threshold?'<div style="font-size:11px;color:var(--rose);margin-top:4px;font-family:var(--mono)">Threshold: '+esc(s.trigger_threshold)+'</div>':'')+(s.decision_body?'<div style="font-size:10px;color:var(--t3);margin-top:2px">Decision: '+esc(s.decision_body)+'</div>':'')+'</div>'}return h||genData(d)}
  // Risk
  if(t==='risk'&&d.risks){const colors={high:'var(--rose)',medium:'var(--amber)',low:'var(--green)'};let h=d.overall_level?'<div style="font-size:14px;font-weight:600;margin-bottom:12px">Overall Risk: <span style="color:'+(colors[d.overall_level.toLowerCase()]||'var(--t1)')+'">'+d.overall_level+'</span></div>':'';for(const r of d.risks)h+='<div class="ri"><div class="rih"><span class="badge bc">'+esc(r.risk_id||'')+'</span><span class="badge" style="background:'+(colors[r.severity]||'var(--amber)')+'22;color:'+(colors[r.severity]||'var(--amber)')+'">'+esc((r.severity||'').toUpperCase())+'</span><span style="font-size:10px;color:var(--t3);font-family:var(--mono)">'+esc(r.category||'')+'</span>'+gr(r.grounding)+'</div><div style="font-size:12px;margin-top:6px">'+esc(r.description)+'</div>'+(r.text_flagged?'<div style="font-size:11px;color:var(--amber);font-style:italic;margin-top:4px;padding:6px 8px;background:rgba(245,158,11,.06);border-radius:4px">"'+esc(r.text_flagged)+'"</div>':'')+(r.recommendation?'<div style="font-size:11px;color:var(--cyan);margin-top:4px">\ud83d\udca1 '+esc(r.recommendation)+'</div>':'')+'</div>';return h}
  // Deviation Rules (grouped by criterion)
  if(t==='deviation'&&d.criteria){
    let h='<div style="display:flex;gap:16px;margin-bottom:16px;font-size:12px"><span><strong style="color:var(--t0);font-size:18px">'+(d.total_rules||0)+'</strong> Rules</span><span><strong style="color:var(--rose);font-size:18px">'+(d.hard_rules||0)+'</strong> Hard</span><span><strong style="color:var(--amber);font-size:18px">'+(d.soft_rules||0)+'</strong> Soft</span></div>';
    for(const c of d.criteria){
      const ruleCount=c.rules?c.rules.length:0;
      const hardCount=c.rules?c.rules.filter(r=>r.rule_type==='Hard').length:0;
      const softCount=ruleCount-hardCount;
      h+='<div class="ri" style="padding:0;overflow:hidden;margin-bottom:12px">';
      // Header
      h+='<div style="padding:12px 16px;display:flex;align-items:center;gap:10px;background:var(--bg-2)">';
      h+='<span class="badge bp" style="min-width:50px;text-align:center">'+esc(c.criterion_id||'')+'</span>';
      h+='<div style="flex:1"><strong style="font-size:13px">'+esc(c.title||'')+'</strong>';
      h+='<div style="font-size:11px;color:var(--t3);margin-top:2px">'+esc(c.part||'')+' · '+ruleCount+' rules · '+hardCount+' hard / '+softCount+' soft</div></div></div>';
      // Verbatim
      if(c.verbatim)h+='<div style="padding:10px 16px;background:var(--bg-3);font-size:12px;color:var(--t2);font-style:italic;line-height:1.6;border-bottom:1px solid var(--border)">"'+escML(c.verbatim)+'"</div>';
      // eCRF Fields + SDTM
      if(c.sdtm_domains&&c.sdtm_domains.length){h+='<div style="padding:10px 16px;border-bottom:1px solid var(--border)"><div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">SDTM Domains</div><div style="display:flex;gap:4px;flex-wrap:wrap">';for(const s of c.sdtm_domains)h+='<span style="background:rgba(59,130,246,.1);color:var(--cyan);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">'+esc(s)+'</span>';h+='</div></div>'}
      if(c.fields&&c.fields.length){h+='<div style="padding:10px 16px;border-bottom:1px solid var(--border)"><div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">eCRF Fields</div><table style="width:100%;border-collapse:collapse;font-size:12px">';for(const f of c.fields)h+='<tr><td style="padding:4px 8px;font-family:var(--mono);font-size:11px;color:var(--cyan);white-space:nowrap;border-bottom:1px solid var(--bg-2)">'+esc(f.variable||'')+'</td><td style="padding:4px 8px;color:var(--t2);border-bottom:1px solid var(--bg-2)">'+esc(f.description||'')+'</td></tr>';h+='</table></div>'}
      // Rules
      if(c.rules&&c.rules.length){h+='<div style="padding:10px 16px"><div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Validation Rules</div>';
        for(const r of c.rules){const isHard=r.rule_type==='Hard';const bg=isHard?'rgba(239,68,68,.06)':'rgba(245,158,11,.06)';const border=isHard?'rgba(239,68,68,.2)':'rgba(245,158,11,.2)';const color=isHard?'var(--rose)':'var(--amber)';
          h+='<div style="border:1px solid '+border+';border-radius:8px;padding:12px;margin-bottom:8px;background:'+bg+'">';
          h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="background:'+(isHard?'rgba(239,68,68,.15)':'rgba(245,158,11,.15)')+';color:'+color+';padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">'+esc((r.rule_type||'').toUpperCase())+'</span><span style="font-family:var(--mono);font-size:11px;color:var(--t2);font-weight:600">'+esc(r.rule_id||'')+'</span></div>';
          if(r.logic)h+='<div style="font-size:12px;margin-bottom:4px"><span style="font-weight:600;color:var(--t1)">Logic: </span><span style="font-family:var(--mono);font-size:11px;color:var(--t0);background:var(--bg-2);padding:2px 6px;border-radius:4px">'+esc(r.logic)+'</span></div>';
          if(r.check)h+='<div style="font-size:12px;margin-bottom:4px;color:var(--t2)"><span style="font-weight:600;color:var(--t1)">Check: </span>'+esc(r.check)+'</div>';
          if(r.action)h+='<div style="font-size:12px;color:'+color+';font-weight:500"><span style="font-weight:600">Action: </span>'+esc(r.action)+'</div>';
          h+='</div>';}

        content+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:var(--t3)"><span class="spinner"></span> Working...</div>';
        content+='</div>';
      }else{
        content+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12px;color:var(--t2)"><span class="spinner"></span> Agent thinking...</div>';
      }
    }
    content+='</div><div class="chat-in"><input id="ci" placeholder="Ask about the protocol..."'+(S.loading?' disabled':'')+'><button id="cs"'+(S.loading?' disabled':'')+'>Send</button></div></div>';
  }

  const pageTitle={upload:'Protocol Upload',examples:'Analysis Types',chat:'Agent Chat'};
  a.innerHTML='<div class="sidebar"><div class="sidebar-brand"><h1>Protocol<span>Intel</span></h1><p>Agentic Protocol Intelligence</p></div><div class="sidebar-nav">'+nav+'</div><div class="sidebar-footer">'+(S.loaded?'<div style="font-family:var(--mono)">'+esc(S.name)+'</div><div style="color:var(--green);font-weight:500">● Protocol loaded</div>':'No protocol loaded')+'</div></div><div class="main"><div class="topbar"><span class="topbar-title">'+(pageTitle[S.page]||'')+'</span>'+(S.loaded?'<span class="topbar-meta">'+esc(S.name)+'</span>':'')+'</div><div class="content">'+content+'</div></div>';

  // Bind
  document.querySelectorAll('[data-n]').forEach(e=>e.onclick=()=>{S.page=e.dataset.n;R()});
  document.querySelectorAll('[data-q]').forEach(e=>e.onclick=()=>{const q=QS.find(x=>x.id===e.dataset.q);if(q)doQuery(q.l,q.id)});
  const uz=document.getElementById('uz'),fi=document.getElementById('fi');
  if(uz)uz.onclick=()=>fi&&fi.click();
  if(fi)fi.onchange=e=>{if(e.target.files[0])doUpload(e.target.files[0])};
  const ci=document.getElementById('ci'),cs=document.getElementById('cs');
  if(ci)ci.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}};
  if(cs)cs.onclick=doSend;
  // Scroll
  setTimeout(()=>{const el=document.getElementById('cm');if(el)el.scrollTop=el.scrollHeight},50);
}

async function doLoad(){
  const uh=document.getElementById('uh');if(uh)uh.textContent='Loading...';
  try{const r=await api.load();if(r.protocol_name){S.loaded=true;S.name=r.protocol_name;S.meta=r.metadata;S.page='examples';R()}else alert('Load failed: '+(r.detail||''))}catch(e){alert('Load failed: '+e.message)}
}
async function doUpload(f){
  const uh=document.getElementById('uh');if(uh)uh.textContent='Uploading '+f.name+'...';
  try{const r=await api.upload(f);if(r.status==='success'){S.loaded=true;S.name=r.protocol_name;S.meta=r.metadata;S.page='examples';R()}else{alert('Upload failed: '+(r.detail||r.error||''));R()}}catch(e){alert('Upload failed: '+e.message);R()}
}
async function doQuery(q,t){
  if(S.loading)return;S.page='chat';S.loading=true;S.steps=[];S.liveEvents=[];S.msgs.push({role:'user',content:q});R();
  try{
    const resp=await fetch('/api/query/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,query_type:t||null})});
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.type==='status'||ev.type==='tool'){
            S.liveEvents.push(ev);R();
          }else if(ev.type==='result'){
            const r=ev.data;
            S.msgs.push({role:'assistant',data:r.data,queryType:r.query_type,validation:r.validation,signals:r.signals||[],steps:r.steps,observations:r.observations,rounds:r.retrieval_rounds,totalMs:r.total_ms});
          }else if(ev.type==='error'){
            S.msgs.push({role:'assistant',data:null,steps:[],observations:'Error: '+ev.error});
          }
        }catch(pe){}
      }
    }
  }catch(e){S.msgs.push({role:'assistant',data:null,steps:[],observations:'Error: '+e.message})}
  S.loading=false;S.liveEvents=[];S.steps=[];R();
}
async function doSend(){
  const ci=document.getElementById('ci');if(!ci||!ci.value.trim()||S.loading)return;
  const q=ci.value.trim();ci.value='';doQuery(q,null);
}

(async()=>{try{const s=await api.status();if(s.loaded){S.loaded=true;S.name=s.protocol_name;S.meta=s.metadata;S.page='examples'}}catch(e){}R()})();

function openFullReport(dataStr, queryType) {

`);
  
  // TITLE
  const titles = {endpoints:'Endpoint Extraction Report',eligibility:'Eligibility Criteria Report',

    risk:'Protocol Quality Report',ambiguity:'Ambiguity Analysis Report',
    consistency:'Consistency Check Report',soa:'Schedule of Activities Report',
